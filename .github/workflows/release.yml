name: Release

# Pokreće se na push taga oblika v1.2.3, ili ručno iz Actions taba.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Verzija / tag (npr. v0.1.0)"
        required: true
        default: "v0.1.0"

jobs:
  build:
    permissions:
      contents: write # potrebno za kreiranje GitHub Release-a
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            installer: dmg
          - platform: windows-latest
            args: ""
            rust_targets: ""
            installer: msi
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm install

      - name: Generate app icons (.icns / .ico for all platforms)
        working-directory: apps/desktop
        run: npm run tauri -- icon src-tauri/icons/icon.png

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}

      - name: Collect installer under a stable name
        shell: bash
        run: |
          mkdir -p dist-installers
          if [ "${{ matrix.installer }}" = "msi" ]; then
            src=$(ls apps/desktop/src-tauri/target/release/bundle/msi/*.msi | head -n1)
            cp "$src" "dist-installers/RvgeShot-Setup.msi"
          else
            src=$(ls apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg | head -n1)
            cp "$src" "dist-installers/RvgeShot.dmg"
          fi
          ls -la dist-installers

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: RvgeShot ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: dist-installers/*
          body: |
            ## RvgeShot ${{ github.event.inputs.tag || github.ref_name }}

            **Windows:** download `RvgeShot-Setup.msi`
            **macOS:** download `RvgeShot.dmg` (Apple Silicon + Intel)

            > Builds are not code-signed yet. On Windows, SmartScreen may warn —
            > click "More info → Run anyway". On macOS, right-click the app →
            > "Open" the first time.
